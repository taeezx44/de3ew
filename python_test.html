<!DOCTYPE html>
<html>
<head>
    <title>Python Execution Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 150px; font-family: monospace; margin: 10px 0; }
        button { background: #007acc; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        .output { background: #2d2d2d; color: #00d4aa; padding: 15px; font-family: monospace; border-radius: 4px; min-height: 100px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Python Execution Test</h1>
        <p>Test real Python execution in browser using Pyodide</p>
        
        <textarea id="code" placeholder="Enter Python code here..."># Test Python code
print("Hello from Python!")
x = [1, 2, 3, 4, 5]
squares = [i**2 for i in x]
print(f"Numbers: {x}")
print(f"Squares: {squares}")
print(f"Sum: {sum(squares)}")</textarea>
        
        <button onclick="runPython()">▶ Run Python</button>
        
        <h3>Output:</h3>
        <div id="output" class="output">Loading Python environment...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script>
        let pyodide = null;
        let pyodideReady = false;

        async function initPyodide() {
            try {
                pyodide = await loadPyodide();
                pyodideReady = true;
                document.getElementById('output').textContent = 'Python environment ready! Click "Run Python" to execute code.';
                console.log('Pyodide loaded successfully');
            } catch (error) {
                console.error('Failed to load Pyodide:', error);
                document.getElementById('output').textContent = 'Error loading Python environment: ' + error.message;
            }
        }

        async function runPython() {
            const code = document.getElementById('code').value;
            const output = document.getElementById('output');
            
            if (!pyodideReady) {
                output.textContent = 'Python environment is still loading... Please wait.';
                return;
            }
            
            output.textContent = 'Running...';
            
            try {
                // Capture stdout
                pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
                `);
                
                // Run user code
                pyodide.runPython(code);
                
                // Get output
                const result = pyodide.runPython(`
output = sys.stdout.getvalue()
sys.stdout = sys.__stdout__
output
                `);
                
                output.textContent = result || '(no output)';
            } catch (error) {
                output.textContent = `Error: ${error.message}`;
                output.style.color = '#ff6b6b';
            }
        }

        // Initialize Pyodide when page loads
        window.addEventListener('load', initPyodide);
    </script>
</body>
</html>
